<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebHunt</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

header {
  background: linear-gradient(135deg, #2563eb, #1e40af);
  padding: 50px;
  text-align: center;
}

header h1 {
  margin: 0;
  font-size: 42px;
}

.search {
  text-align: center;
  margin: 20px;
}

.search input {
  width: 80%;
  max-width: 500px;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

.categories {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 15px;
  padding: 20px;
  max-width: 1000px;
  margin: auto;
}

.card {
  background: #1e293b;
  padding: 15px;
  text-align: center;
  border-radius: 10px;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-3px);
  background: #334155;
}

a {
  color: #60a5fa;
  text-decoration: none;
}
</style>
</head>

<body>

<header>
  <h1>🔎 WebHunt</h1>
</header>

<div class="search">
  <input type="text" placeholder="Search websites...">
</div>

<section class="categories">

  <a class="card" href="utilities.html">🛠 Utilities</a>
  <a class="card" href="ai.html">🤖 AI Tools</a>
  <a class="card" href="entertainment.html">🎬 Entertainment</a>
  <a class="card" href="fun.html">🎉 Fun</a>
  <a class="card" href="games.html">🎮 Games</a>
  <a class="card" href="sports.html">🏏 Sports</a>
  <a class="card" href="vpn.html">🔐 VPN</a>
  <a class="card" href="livetv.html">📺 Live TV</a>
  <a class="card" href="educational.html">📚 Educational</a>
  <a class="card" href="magazines.html">📰 Magazines</a>
  <a class="card" href="books.html">📖 Books</a>

</section>

</body>
</html></div>

<footer>
  © 2026 WebHunt • Built on GitHub Pages
</footer>

</body>
</html>
